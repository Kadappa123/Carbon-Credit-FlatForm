name: Continuous Integration

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: carbon_credit_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:

    ###########################################################
    # Checkout
    ###########################################################

    - name: Checkout Repository
      uses: actions/checkout@v4

    ###########################################################
    # Python
    ###########################################################

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: pip
        cache-dependency-path: backend/requirements.txt

    - name: Install Backend Dependencies
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    ###########################################################
    # Backend Environment
    ###########################################################

    - name: Create Backend .env
      working-directory: backend
      run: |
        cat <<EOF > .env
        SECRET_KEY=test-secret-key
        DEBUG=True
        ALLOWED_HOSTS=localhost,127.0.0.1

        DB_NAME=carbon_credit_db
        DB_USER=postgres
        DB_PASSWORD=postgres
        DB_HOST=localhost
        DB_PORT=5432

        REDIS_URL=redis://localhost:6379/0

        USE_SQLITE=False

        CORS_ALLOWED_ORIGINS=http://localhost:3000

        EMAIL_HOST=smtp.gmail.com
        EMAIL_PORT=587
        EMAIL_HOST_USER=
        EMAIL_HOST_PASSWORD=
        EOF

    ###########################################################
    # Django Checks
    ###########################################################

    - name: Django System Check
      working-directory: backend
      run: python manage.py check

    - name: Run Database Migrations
      working-directory: backend
      run: python manage.py migrate --noinput

    - name: Run Django Tests
      working-directory: backend
      run: python manage.py test
      continue-on-error: true

    ###########################################################
    # Node
    ###########################################################

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: npm
        cache-dependency-path: |
          frontend/package-lock.json
          blockchain/package-lock.json

    ###########################################################
    # Frontend
    ###########################################################

    - name: Install Frontend Dependencies
      working-directory: frontend
      run: npm ci

    - name: Build React Application
      working-directory: frontend
      run: npm run build

    ###########################################################
    # Blockchain
    ###########################################################

    - name: Install Blockchain Dependencies
      working-directory: blockchain
      run: |
        if [ -f package.json ]; then
          npm install
        fi

    ###########################################################
    # Docker
    ###########################################################

    - name: Validate Docker Compose
      run: docker compose config

    - name: Build Docker Images
      run: docker compose build

    ###########################################################
    # Security
    ###########################################################

    - name: Install Bandit
      run: pip install bandit

    - name: Run Bandit
      run: bandit -r backend
      continue-on-error: true

    - name: Install Safety
      run: pip install safety

    - name: Safety Scan
      run: safety check -r backend/requirements.txt
      continue-on-error: true

    - name: NPM Audit
      working-directory: frontend
      run: npm audit --audit-level=high
      continue-on-error: true

    ###########################################################
    # Docker Images
    ###########################################################

    - name: Show Docker Images
      run: docker images

    ###########################################################
    # Upload React Build
    ###########################################################

    - name: Upload Frontend Build
      uses: actions/upload-artifact@v4
      with:
        name: react-build
        path: frontend/build

    ###########################################################
    # Success
    ###########################################################

    - name: CI Completed
      run: echo "✅ Carbon Credit Platform CI Completed Successfully"
